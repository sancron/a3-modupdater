# ModUpdater Example Config (English)

[steam]
cmd_path = "C:\Tools\steamcmd"          # SteamCMD install folder
exe_name = "steamcmd.exe"                 # Usually unchanged
app_id   = "107410"                       # Arma 3 workshop app id
login_user = ""                           # optional; empty => anonymous
login_pass = ""                           # optional; empty => prompt/anonymous
runscript_path = "C:\Tools\steamcmd\SteamCMD.txt"  # script generated by modupdater

[paths]
final_mod_path = "C:\Arma3Sync\workshop_download\final"  # destination for @mods
repo_html      = "C:\Arma3Sync\workshop_download\repo.html"  # Arma3Sync export
mods_txt       = "C:\Arma3Sync\workshop_download\mods.txt"   # generated mod list
log_file       = "C:\Tools\steamcmd\arma3_modmanager.log"    # rotating log file
master_copy    = "C:\Arma3Sync\master"                        # Robocopy target

[behavior]
do_clean   = true    # remove orphaned @folders / stale junctions
do_rename  = true    # slugify @folder names
do_copy    = false   # run Robocopy step after workflow/do copy command
do_symlink = true    # create junctions for downloaded mods
validate   = true    # add "validate" to each SteamCMD download

dry_run    = false   # report actions only, do not modify disk

[copy]
mode = "mods"       # "maps" | "mods" | "all"
options = ["/MIR", "/COPYALL", "/R:5", "/W:10"]

exclude_dirs = [     # directories under final_mod_path to skip during Robocopy
  "steamapps",
  ".a3s"
]

[copy.map_rename]
"@anizay" = "@ter_anizay_cup"
"@cham"   = "@ter_cham_gm"
"@rosche,_germany" = "@ter_rosche_cup"

# --------------------------------------------------
# Tips
# --------------------------------------------------
# 1) Use single backslashes in paths; the loader escapes them automatically.
# 2) You can split recurring lists (exclude_dirs, map_rename) into
#    modupdater.global.toml located next to modupdater.exe or modupdater.pyz.
#    Local config values override the global defaults.
# 3) Set behavior.do_copy=true + mode="maps/mods/all" to enable the Robocopy step.
# 4) Pass --dry-run in the CLI to preview all actions before changing files.
